<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salpila Pavers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F4F6F9; --card: #FFFFFF; --border: #E8ECF0;
  --text-primary: #1A2332; --text-secondary: #3D4F5F; --text-muted: #8896A6;
  --accent: #2C3E50; --accent-blue: #3498DB;
  --green: #27AE60; --orange: #E67E22; --red: #E74C3C; --purple: #9B59B6;
  --radius: 12px; --font: 'DM Sans', sans-serif; --font-display: 'Playfair Display', serif;
}
body { font-family: var(--font); background: var(--bg); color: var(--text-secondary); font-size: 14px; min-height: 100vh; }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--card); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; display: flex; flex-direction: column; transition: transform 0.25s ease; }
.sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; display: none; }
.main { flex: 1; margin-left: 240px; min-height: 100vh; }
.logo-area { display: flex; align-items: center; gap: 12px; padding: 20px 16px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-blue)); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; letter-spacing: 1px; }
.logo-text { font-family: var(--font-display); font-weight: 800; font-size: 18px; color: var(--text-primary); line-height: 1.1; }
.logo-sub { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
.nav { flex: 1; padding: 8px; }
.nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-muted); font-family: var(--font); margin-bottom: 2px; transition: all 0.15s; }
.nav-btn:hover { background: #F4F6F9; color: var(--text-secondary); }
.nav-btn.active { background: #EBF5FB; color: #2980B9; font-weight: 700; }
.nav-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); text-align: center; }
.page-header { padding: 20px 32px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
.page-header h1 { font-family: var(--font-display); font-weight: 800; font-size: 24px; color: var(--text-primary); }
.hamburger { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-primary); }
.page-content { padding: 24px 32px; max-width: 1200px; }
.page { display: none; }
.page.active { display: block; }
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
.card-title { font-family: var(--font); font-weight: 700; font-size: 16px; color: var(--text-primary); margin-bottom: 16px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.stat-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; border-left: 4px solid var(--accent); }
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.stat-value { font-size: 32px; font-weight: 800; color: var(--text-primary); font-family: var(--font); margin-top: 4px; }
.stat-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; font-family: var(--font); transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { filter: brightness(0.93); }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-blue)); color: #fff; }
.btn-secondary { background: #F0F3F6; color: var(--text-secondary); }
.btn-danger { background: var(--red); color: #fff; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-success { background: var(--green); color: #fff; }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.filters { display: flex; gap: 10px; flex-wrap: wrap; }
input, select { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #D5DBDB; font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.15s; }
input:focus, select:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(52,152,219,0.1); }
.filter-select { width: auto; min-width: 130px; margin: 0; }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.toggle-group { display: flex; gap: 8px; }
.toggle-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #D5DBDB; background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; font-family: var(--font); color: var(--text-muted); transition: all 0.15s; }
.toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.calc-preview { padding: 10px 14px; background: #EBF5FB; border-radius: 8px; font-size: 14px; color: var(--accent); margin-top: 8px; }
.stock-preview { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 14px; }
.stock-ok { background: #EBF5FB; }
.stock-low { background: #FDEDEC; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); border-bottom: 2px solid var(--border); }
td { padding: 12px; border-bottom: 1px solid #F0F3F6; font-size: 14px; }
tr:hover { background: #F8FAFB; }
.fw-600 { font-weight: 600; }
.fw-700 { font-weight: 700; font-family: var(--font); }
.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.badge-red { background: #C0392B; color: #fff; }
.badge-black { background: #2C3E50; color: #fff; }
.badge-ash { background: #95A5A6; color: #fff; }
.badge-white { background: #ECF0F1; color: #2C3E50; }
.badge-default { background: #888; color: #fff; }
.badge-active { background: #E8F8F0; color: var(--green); }
.badge-inactive { background: #FDEDEC; color: var(--red); }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: 4px; display: inline-flex; align-items: center; transition: color 0.15s; }
.icon-btn:hover { color: var(--text-primary); }
.icon-btn.danger:hover { color: var(--red); }
.list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #F0F3F6; }
.list-item:last-child { border-bottom: none; }
.empty { text-align: center; padding: 48px 24px; color: var(--text-muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.color-chip { display: inline-flex; align-items: center; gap: 6px; background: #F0F3F6; border-radius: 20px; padding: 6px 12px; font-size: 13px; font-weight: 600; }
.color-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
.stock-positive { color: var(--green); }
.stock-low-val { color: var(--orange); }
.stock-out { color: var(--red); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 16px; width: 90%; max-width: 480px; max-height: 85vh; overflow: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-wide { max-width: 700px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-family: var(--font); font-weight: 700; font-size: 18px; }
.modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted); padding: 0 4px; }
.modal-body { padding: 24px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.price-input { width: 100px; padding: 6px 10px; text-align: right; font-size: 13px; }
.price-table th, .price-table td { padding: 8px 10px; font-size: 13px; }
.price-table input { width: 90px; padding: 6px 8px; text-align: right; }
.location-tab { padding: 10px 20px; border: none; background: #F0F3F6; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 14px; font-weight: 600; font-family: var(--font); color: var(--text-muted); transition: all 0.15s; }
.location-tab.active { background: var(--card); color: var(--accent-blue); border: 1px solid var(--border); border-bottom: 1px solid var(--card); margin-bottom: -1px; position: relative; z-index: 1; }
.price-card { border: 1px solid var(--border); border-radius: 0 var(--radius) var(--radius) var(--radius); padding: 20px; background: var(--card); }
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { margin-left: 0; }
  .hamburger { display: block; }
  .page-content { padding: 16px; }
  .page-header { padding: 16px; }
  .two-col { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #D5DBDB; border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo-area">
      <div class="logo-icon">SP</div>
      <div>
        <div class="logo-text">Salpila Pavers</div>
        <div class="logo-sub">Production Manager</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer">v1.0 · Salpila Pavers</div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main">
    <header class="page-header">
      <button class="hamburger" id="hamburgerBtn">☰</button>
      <h1 id="pageTitle">Dashboard</h1>
    </header>
    <div class="page-content">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-production" class="page"></div>
      <div id="page-sales" class="page"></div>
      <div id="page-inventory" class="page"></div>
      <div id="page-pricelist" class="page"></div>
      <div id="page-admin" class="page"></div>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-production">
  <div class="modal"><div class="modal-header"><h3>Add Production Entry</h3><button class="modal-close" onclick="closeModal('production')">&times;</button></div><div class="modal-body" id="production-form"></div></div>
</div>
<div class="modal-overlay" id="modal-sales">
  <div class="modal"><div class="modal-header"><h3>Record Sale</h3><button class="modal-close" onclick="closeModal('sales')">&times;</button></div><div class="modal-body" id="sales-form"></div></div>
</div>
<div class="modal-overlay" id="modal-design">
  <div class="modal"><div class="modal-header"><h3 id="design-modal-title">Add Design</h3><button class="modal-close" onclick="closeModal('design')">&times;</button></div><div class="modal-body" id="design-form"></div></div>
</div>
<div class="modal-overlay" id="modal-prices">
  <div class="modal modal-wide"><div class="modal-header"><h3 id="prices-modal-title">Edit Prices</h3><button class="modal-close" onclick="closeModal('prices')">&times;</button></div><div class="modal-body" id="prices-form"></div></div>
</div>

<script>
// ═══ STATE ═══
let state = { designs: [], colors: [], locations: [], production: [], sales: [], prices: [], currentPage: 'dashboard' };
const API = '';

async function api(path, opts = {}) {
  const res = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts, body: opts.body ? JSON.stringify(opts.body) : undefined });
  return res.json();
}

async function loadAll() {
  const [designs, colors, locations, production, sales, prices] = await Promise.all([
    api('/api/designs'), api('/api/colors'), api('/api/locations'),
    api('/api/production'), api('/api/sales'), api('/api/prices'),
  ]);
  state = { ...state, designs, colors, locations, production, sales, prices };
}

// ═══ HELPERS ═══
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
function fmtNum(n) { return Number(n).toLocaleString(); }
function fmtPrice(n) { return 'Rs. ' + Number(n).toFixed(2); }
function colorBadge(color) {
  const cls = { Red: 'badge-red', Black: 'badge-black', Ash: 'badge-ash', White: 'badge-white' };
  return `<span class="badge ${cls[color] || 'badge-default'}">${color}</span>`;
}
function colorDotHex(color) {
  const map = { Red: '#C0392B', Black: '#2C3E50', Ash: '#95A5A6', White: '#ECF0F1' };
  return map[color] || '#888';
}
function getActiveDesigns() { return state.designs.filter(d => d.active); }
function getStock(designId, color) {
  const produced = state.production.filter(p => p.designId === designId && p.color === color).reduce((s, p) => s + p.units, 0);
  const sold = state.sales.filter(s => s.designId === designId && s.color === color).reduce((s, p) => s + p.units, 0);
  return produced - sold;
}
function getPrice(designId, color, location) {
  const p = state.prices.find(x => x.designId === designId && x.color === color && x.location === location);
  return p ? p.price : 0;
}

// ═══ NAV ═══
const pages = [
  { id: 'dashboard', label: 'Dashboard', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>' },
  { id: 'production', label: 'Production', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20"/><path d="M5 20V8l4-4 4 4v12"/><path d="M9 12h2"/><path d="M9 16h2"/><path d="M17 20V4h4v16"/></svg>' },
  { id: 'sales', label: 'Sales', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>' },
  { id: 'inventory', label: 'Inventory', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>' },
  { id: 'pricelist', label: 'Price List', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H2v7l6.29 6.29c.94.94 2.48.94 3.42 0l4.58-4.58c.94-.94.94-2.48 0-3.42L9 5z"/><circle cx="6" cy="9" r="1"/></svg>' },
  { id: 'admin', label: 'Admin', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>' },
];

function buildNav() {
  document.getElementById('nav').innerHTML = pages.map(p =>
    `<button class="nav-btn ${state.currentPage === p.id ? 'active' : ''}" onclick="navigate('${p.id}')">${p.icon}<span>${p.label}</span></button>`
  ).join('');
}

function navigate(pageId) {
  state.currentPage = pageId;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  document.getElementById('pageTitle').textContent = pages.find(p => p.id === pageId).label;
  buildNav(); closeSidebar(); renderPage(pageId);
}

function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
document.getElementById('hamburgerBtn').onclick = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); };
document.getElementById('sidebarOverlay').onclick = closeSidebar;

function openModal(name) { document.getElementById('modal-' + name).classList.add('open'); }
function closeModal(name) { document.getElementById('modal-' + name).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => { el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); }); });

function renderPage(id) {
  switch(id) {
    case 'dashboard': renderDashboard(); break;
    case 'production': renderProduction(); break;
    case 'sales': renderSales(); break;
    case 'inventory': renderInventory(); break;
    case 'pricelist': renderPriceList(); break;
    case 'admin': renderAdmin(); break;
  }
}

// ═══ DASHBOARD ═══
async function renderDashboard() {
  const stats = await api('/api/stats');
  document.getElementById('page-dashboard').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" style="border-left-color:var(--green)"><div class="stat-label">Total Produced</div><div class="stat-value">${fmtNum(stats.totalProduced)}</div><div class="stat-sub">${fmtNum(stats.totalBags)} bags used</div></div>
      <div class="stat-card" style="border-left-color:var(--accent-blue)"><div class="stat-label">Total Sold</div><div class="stat-value">${fmtNum(stats.totalSold)}</div><div class="stat-sub">${fmtNum(stats.todaySold)} today</div></div>
      <div class="stat-card" style="border-left-color:var(--orange)"><div class="stat-label">Current Stock</div><div class="stat-value">${fmtNum(stats.totalStock)}</div><div class="stat-sub">${fmtNum(stats.todayProduced)} made today</div></div>
      <div class="stat-card" style="border-left-color:var(--purple)"><div class="stat-label">Active Designs</div><div class="stat-value">${stats.activeDesigns}</div><div class="stat-sub">${stats.colorCount} colors</div></div>
    </div>
    <div class="two-col">
      <div class="card"><div class="card-title">Recent Production</div>${stats.recentProduction.length === 0 ? '<div class="empty"><div class="empty-icon">🏭</div><p>No production yet</p></div>' : stats.recentProduction.map(p => `<div class="list-item"><div><div class="fw-600" style="color:var(--text-primary)">${p.designName||'Unknown'}</div><div style="font-size:12px;color:var(--text-muted)">${fmtDate(p.date)}${p.bags?' · '+p.bags+' bags':''}</div></div><div style="display:flex;align-items:center;gap:8px">${colorBadge(p.color)}<span class="fw-700" style="color:var(--text-primary)">${fmtNum(p.units)}</span></div></div>`).join('')}</div>
      <div class="card"><div class="card-title">Recent Sales</div>${stats.recentSales.length === 0 ? '<div class="empty"><div class="empty-icon">💰</div><p>No sales yet</p></div>' : stats.recentSales.map(s => `<div class="list-item"><div><div class="fw-600" style="color:var(--text-primary)">${s.designName||'Unknown'}</div><div style="font-size:12px;color:var(--text-muted)">${fmtDate(s.date)}${s.customer?' · '+s.customer:''}</div></div><div style="display:flex;align-items:center;gap:8px">${colorBadge(s.color)}<span class="fw-700" style="color:var(--text-primary)">${fmtNum(s.units)}</span></div></div>`).join('')}</div>
    </div>`;
}

// ═══ PRODUCTION ═══
function renderProduction() {
  const ad = getActiveDesigns();
  document.getElementById('page-production').innerHTML = `
    <div class="toolbar"><div class="filters">
      <select class="filter-select" id="prod-filter-design"><option value="all">All Designs</option>${ad.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select>
      <select class="filter-select" id="prod-filter-color"><option value="all">All Colors</option>${state.colors.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
    </div><button class="btn btn-primary" onclick="openProductionModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add Production</button></div>
    <div class="card" id="production-table"></div>`;
  document.getElementById('prod-filter-design').onchange = renderProductionTable;
  document.getElementById('prod-filter-color').onchange = renderProductionTable;
  renderProductionTable();
}
function renderProductionTable() {
  const fd = document.getElementById('prod-filter-design').value, fc = document.getElementById('prod-filter-color').value;
  let data = [...state.production];
  if (fd !== 'all') data = data.filter(p => p.designId === fd);
  if (fc !== 'all') data = data.filter(p => p.color === fc);
  data.sort((a,b) => b.date.localeCompare(a.date));
  const el = document.getElementById('production-table');
  if (!data.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🏭</div><p>No production entries. Add your first one!</p></div>'; return; }
  el.innerHTML = `<div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Design</th><th>Color</th><th>Bags</th><th>Units</th><th></th></tr></thead><tbody>${data.map(p => { const d = state.designs.find(x=>x.id===p.designId); return `<tr><td>${fmtDate(p.date)}</td><td class="fw-600">${d?.name||'—'}</td><td>${colorBadge(p.color)}</td><td>${p.bags||'—'}</td><td class="fw-700">${fmtNum(p.units)}</td><td><button class="icon-btn danger" onclick="deleteProduction('${p.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></td></tr>`; }).join('')}</tbody></table></div>`;
}
function openProductionModal() {
  const ad = getActiveDesigns();
  if (!ad.length) { alert('No active designs. Add one in Admin.'); return; }
  document.getElementById('production-form').innerHTML = `
    <div class="form-group"><label class="form-label">Design</label><select id="pf-design">${ad.map(d=>`<option value="${d.id}">${d.name} ${d.measureByBag?'('+d.unitsPerBag+'/bag)':'(units)'}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Color</label><select id="pf-color">${state.colors.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
    <div class="form-group" id="pf-mode-group"><label class="form-label">Input Method</label><div class="toggle-group"><button class="toggle-btn active" id="pf-mode-bags" onclick="setProdMode('bags')">Cement Bags</button><button class="toggle-btn" id="pf-mode-units" onclick="setProdMode('units')">Direct Units</button></div></div>
    <div class="form-group" id="pf-bags-group"><label class="form-label">Number of Cement Bags</label><input type="number" id="pf-bags" min="0" step="0.5" placeholder="e.g. 10" oninput="updateProdCalc()"><div class="calc-preview" id="pf-calc" style="display:none"></div></div>
    <div class="form-group" id="pf-units-group" style="display:none"><label class="form-label">Number of Units</label><input type="number" id="pf-units" min="0" placeholder="e.g. 500"></div>
    <div class="form-group"><label class="form-label">Date</label><input type="date" id="pf-date" value="${todayStr()}"></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal('production')">Cancel</button><button class="btn btn-primary" onclick="submitProduction()">Save Entry</button></div>`;
  document.getElementById('pf-design').onchange = updateProdForm; updateProdForm(); openModal('production');
}
let prodMode = 'bags';
function setProdMode(mode) { prodMode = mode; document.getElementById('pf-mode-bags').classList.toggle('active',mode==='bags'); document.getElementById('pf-mode-units').classList.toggle('active',mode==='units'); document.getElementById('pf-bags-group').style.display = mode==='bags'?'':'none'; document.getElementById('pf-units-group').style.display = mode==='units'?'':'none'; }
function updateProdForm() { const d = state.designs.find(x=>x.id===document.getElementById('pf-design').value); if(d&&!d.measureByBag){document.getElementById('pf-mode-group').style.display='none';setProdMode('units');}else{document.getElementById('pf-mode-group').style.display='';setProdMode('bags');} }
function updateProdCalc() { const d = state.designs.find(x=>x.id===document.getElementById('pf-design').value); const bags = parseFloat(document.getElementById('pf-bags').value)||0; const calc = document.getElementById('pf-calc'); if(bags>0&&d){calc.style.display='';calc.innerHTML=`= <strong>${fmtNum(Math.round(bags*d.unitsPerBag))}</strong> units <span style="color:var(--text-muted);margin-left:8px">(${d.unitsPerBag} per bag)</span>`;}else{calc.style.display='none';} }
async function submitProduction() {
  const designId = document.getElementById('pf-design').value, color = document.getElementById('pf-color').value, date = document.getElementById('pf-date').value;
  const d = state.designs.find(x=>x.id===designId); let bags=0, units=0;
  if(prodMode==='bags'&&d?.measureByBag){bags=parseFloat(document.getElementById('pf-bags').value)||0;units=Math.round(bags*d.unitsPerBag);}else{units=parseInt(document.getElementById('pf-units').value)||0;}
  if(units<=0){alert('Units must be > 0');return;}
  const entry = await api('/api/production',{method:'POST',body:{designId,color,bags,units,date}}); state.production.unshift(entry); closeModal('production'); renderProductionTable();
}
async function deleteProduction(id) { if(!confirm('Delete this entry?'))return; await api('/api/production/'+id,{method:'DELETE'}); state.production=state.production.filter(p=>p.id!==id); renderProductionTable(); }

// ═══ SALES ═══
function renderSales() {
  const ad = getActiveDesigns();
  document.getElementById('page-sales').innerHTML = `
    <div class="toolbar"><div class="filters">
      <select class="filter-select" id="sales-filter-design"><option value="all">All Designs</option>${ad.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select>
      <select class="filter-select" id="sales-filter-color"><option value="all">All Colors</option>${state.colors.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
    </div><button class="btn btn-primary" onclick="openSalesModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Record Sale</button></div>
    <div class="card" id="sales-table"></div>`;
  document.getElementById('sales-filter-design').onchange = renderSalesTable;
  document.getElementById('sales-filter-color').onchange = renderSalesTable;
  renderSalesTable();
}
function renderSalesTable() {
  const fd = document.getElementById('sales-filter-design').value, fc = document.getElementById('sales-filter-color').value;
  let data = [...state.sales];
  if(fd!=='all') data = data.filter(s=>s.designId===fd);
  if(fc!=='all') data = data.filter(s=>s.color===fc);
  data.sort((a,b)=>b.date.localeCompare(a.date));
  const el = document.getElementById('sales-table');
  if(!data.length){el.innerHTML='<div class="empty"><div class="empty-icon">💰</div><p>No sales recorded. Record your first one!</p></div>';return;}
  el.innerHTML = `<div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Design</th><th>Color</th><th>Units</th><th>Customer</th><th></th></tr></thead><tbody>${data.map(s=>{const d=state.designs.find(x=>x.id===s.designId);return `<tr><td>${fmtDate(s.date)}</td><td class="fw-600">${d?.name||'—'}</td><td>${colorBadge(s.color)}</td><td class="fw-700">${fmtNum(s.units)}</td><td>${s.customer||'—'}</td><td><button class="icon-btn danger" onclick="deleteSale('${s.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></td></tr>`;}).join('')}</tbody></table></div>`;
}
function openSalesModal() {
  const ad = getActiveDesigns();
  if(!ad.length){alert('No active designs.');return;}
  document.getElementById('sales-form').innerHTML = `
    <div class="form-group"><label class="form-label">Design</label><select id="sf-design" onchange="updateSalesStock()">${ad.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Color</label><select id="sf-color" onchange="updateSalesStock()">${state.colors.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
    <div id="sf-stock-info"></div>
    <div class="form-group"><label class="form-label">Units Sold</label><input type="number" id="sf-units" min="0" placeholder="e.g. 200"></div>
    <div class="form-group"><label class="form-label">Customer (optional)</label><input type="text" id="sf-customer" placeholder="e.g. Kandy Builders"></div>
    <div class="form-group"><label class="form-label">Date</label><input type="date" id="sf-date" value="${todayStr()}"></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal('sales')">Cancel</button><button class="btn btn-primary" onclick="submitSale()">Save Sale</button></div>`;
  updateSalesStock(); openModal('sales');
}
function updateSalesStock() { const dId=document.getElementById('sf-design').value,c=document.getElementById('sf-color').value,stock=getStock(dId,c); document.getElementById('sf-stock-info').innerHTML=`<div class="stock-preview ${stock<=0?'stock-low':'stock-ok'}">Available stock: <strong style="color:${stock<=0?'var(--red)':'var(--accent-blue)'}">${fmtNum(stock)}</strong> units</div>`; }
async function submitSale() {
  const designId=document.getElementById('sf-design').value,color=document.getElementById('sf-color').value,units=parseInt(document.getElementById('sf-units').value)||0,customer=document.getElementById('sf-customer').value,date=document.getElementById('sf-date').value;
  if(units<=0){alert('Units must be > 0');return;}
  const entry = await api('/api/sales',{method:'POST',body:{designId,color,units,customer,date}}); state.sales.unshift(entry); closeModal('sales'); renderSalesTable();
}
async function deleteSale(id){if(!confirm('Delete this sale?'))return;await api('/api/sales/'+id,{method:'DELETE'});state.sales=state.sales.filter(s=>s.id!==id);renderSalesTable();}

// ═══ INVENTORY ═══
let invFilter = 'all';
function renderInventory() {
  const el = document.getElementById('page-inventory');
  el.innerHTML = `<div class="toggle-group" style="margin-bottom:20px" id="inv-filters"></div><div class="card" id="inv-table"></div>`;
  document.getElementById('inv-filters').innerHTML = ['all','instock','low','out'].map(f => {
    const labels = {all:'All',instock:'In Stock',low:'Low Stock',out:'Out of Stock'};
    return `<button class="toggle-btn ${invFilter===f?'active':''}" onclick="setInvFilter('${f}')">${labels[f]}</button>`;
  }).join('');
  renderInvTable();
}
function setInvFilter(f){invFilter=f;renderInventory();}
async function renderInvTable() {
  const inv = await api('/api/inventory');
  let data = inv;
  if(invFilter==='instock')data=data.filter(i=>i.stock>0);
  else if(invFilter==='low')data=data.filter(i=>i.stock>0&&i.stock<50);
  else if(invFilter==='out')data=data.filter(i=>i.stock<=0&&i.produced>0);
  const el = document.getElementById('inv-table');
  if(!data.length){el.innerHTML='<div class="empty"><div class="empty-icon">📦</div><p>No items match this filter</p></div>';return;}
  el.innerHTML = `<div style="overflow-x:auto"><table><thead><tr><th>Design</th><th>Color</th><th>Produced</th><th>Sold</th><th>Stock</th></tr></thead><tbody>${data.map(i=>`<tr><td class="fw-600">${i.designName}</td><td>${colorBadge(i.color)}</td><td>${fmtNum(i.produced)}</td><td>${fmtNum(i.sold)}</td><td class="fw-700 ${i.stock<=0?'stock-out':i.stock<50?'stock-low-val':'stock-positive'}">${fmtNum(i.stock)}</td></tr>`).join('')}</tbody></table></div>`;
}

// ═══ PRICE LIST ═══
let priceLocation = '';
function renderPriceList() {
  if(!priceLocation && state.locations.length) priceLocation = state.locations[0];
  const ad = getActiveDesigns();
  const el = document.getElementById('page-pricelist');

  if(!state.locations.length) {
    el.innerHTML = '<div class="card"><div class="empty"><div class="empty-icon">🏷️</div><p>No locations set up yet. Go to Admin to add Kalutara and Colombo.</p></div></div>';
    return;
  }

  const tabs = state.locations.map(l => `<button class="location-tab ${priceLocation===l?'active':''}" onclick="setPriceLocation('${l}')">${l}</button>`).join('');

  let rows = '';
  ad.forEach(d => {
    state.colors.forEach(c => {
      const price = getPrice(d.id, c, priceLocation);
      rows += `<tr><td class="fw-600">${d.name}</td><td>${colorBadge(c)}</td><td class="fw-700" style="color:var(--accent)">${price > 0 ? fmtPrice(price) : '<span style="color:var(--text-muted)">Not set</span>'}</td></tr>`;
    });
  });

  el.innerHTML = `
    <div style="display:flex;gap:4px;margin-bottom:0">${tabs}</div>
    <div class="price-card">
      ${!ad.length ? '<div class="empty"><p>No active designs</p></div>' : `
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Design</th><th>Color</th><th>Price per Unit (${priceLocation})</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`}
    </div>`;
}
function setPriceLocation(l) { priceLocation = l; renderPriceList(); }

// ═══ ADMIN ═══
function renderAdmin() {
  const el = document.getElementById('page-admin');
  el.innerHTML = `
    <h3 style="font-family:var(--font);font-weight:700;color:var(--text-primary);margin-bottom:20px">Admin Panel</h3>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="card-title" style="margin:0">Paving Block Designs</div>
        <button class="btn btn-primary btn-sm" onclick="openDesignModal()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Add Design</button>
      </div>
      <div style="overflow-x:auto"><table><thead><tr><th>Name</th><th>Measure By</th><th>Units/Bag</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${state.designs.map(d=>`<tr style="opacity:${d.active?1:0.5}">
        <td class="fw-600">${d.name}</td><td>${d.measureByBag?'Cement Bags':'Units Only'}</td><td>${d.measureByBag?d.unitsPerBag:'—'}</td>
        <td><span class="badge ${d.active?'badge-active':'badge-inactive'}">${d.active?'Active':'Inactive'}</span></td>
        <td style="display:flex;gap:6px">
          <button class="icon-btn" onclick="openEditDesign('${d.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="icon-btn" onclick="toggleDesign('${d.id}')">${d.active?'⏸':'▶'}</button>
          <button class="icon-btn danger" onclick="deleteDesign('${d.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
        </td></tr>`).join('')}</tbody></table></div>
    </div>

    <div class="card">
      <div class="card-title">Block Colors</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${state.colors.map(c=>`<div class="color-chip"><div class="color-dot" style="background:${colorDotHex(c)}"></div><span>${c}</span><button class="icon-btn" onclick="removeColor('${c}')" style="font-size:16px;padding:0 2px">&times;</button></div>`).join('')}</div>
      <div style="display:flex;gap:8px"><input id="new-color-input" placeholder="New color name" style="flex:1"><button class="btn btn-primary btn-sm" onclick="addColor()">Add</button></div>
    </div>

    <div class="card">
      <div class="card-title">Delivery Locations</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${state.locations.map(l=>`<div class="color-chip"><span>📍 ${l}</span><button class="icon-btn" onclick="removeLocation('${l}')" style="font-size:16px;padding:0 2px">&times;</button></div>`).join('')}</div>
      <div style="display:flex;gap:8px"><input id="new-location-input" placeholder="New location name" style="flex:1"><button class="btn btn-primary btn-sm" onclick="addLocation()">Add</button></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="card-title" style="margin:0">Pricing</div>
      </div>
      <p style="color:var(--text-muted);margin-bottom:16px;font-size:13px">Set prices per unit for each design, color, and location combination.</p>
      ${getActiveDesigns().map(d => `
        <div style="margin-bottom:12px">
          <button class="btn btn-secondary btn-sm" onclick="openPriceEditor('${d.id}')" style="width:100%;justify-content:space-between">
            <span class="fw-600">${d.name}</span><span style="color:var(--accent-blue)">Edit Prices →</span>
          </button>
        </div>

      ${!getActiveDesigns().length ? '<p style="color:var(--text-muted)">No active designs</p>' : ''}

  const ci = document.getElementById('new-color-input');
  if(ci) ci.onkeydown = e => { if(e.key==='Enter') addColor(); };

// Design CRUD
function openDesignModal(editId) {
  const d = editId ? state.designs.find(x=>x.id===editId) : null;
  document.getElementById('design-modal-title').textContent = d ? 'Edit Design' : 'Add New Design';
  document.getElementById('design-form').innerHTML = `
    <div class="form-group"><label class="form-label">Design Name</label><input id="df-name" value="${d?d.name:''}" placeholder="e.g. Hexagonal"></div>
    <div class="form-group"><label class="form-label">Measurement Type</label><div class="toggle-group"><button class="toggle-btn ${(!d||d.measureByBag)?'active':''}" id="df-measure-bag" onclick="setDesignMeasure(true)">Cement Bags</button><button class="toggle-btn ${(d&&!d.measureByBag)?'active':''}" id="df-measure-unit" onclick="setDesignMeasure(false)">Units Only</button></div></div>
    <div class="form-group" id="df-upb-group" style="display:${(!d||d.measureByBag)?'':'none'}"><label class="form-label">Units per Cement Bag</label><input type="number" id="df-upb" min="1" value="${d?d.unitsPerBag:''}" placeholder="e.g. 40"></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal('design')">Cancel</button><button class="btn btn-primary" onclick="submitDesign('${editId||''}')">${d?'Save Changes':'Add Design'}</button></div>`;
  window._designMeasureByBag = d ? d.measureByBag : true;
  openModal('design');
}
function openEditDesign(id){openDesignModal(id);}
function setDesignMeasure(byBag){window._designMeasureByBag=byBag;document.getElementById('df-measure-bag').classList.toggle('active',byBag);document.getElementById('df-measure-unit').classList.toggle('active',!byBag);document.getElementById('df-upb-group').style.display=byBag?'':'none';}
async function submitDesign(editId){
  const name=document.getElementById('df-name').value.trim();if(!name){alert('Name required');return;}
  const measureByBag=window._designMeasureByBag,unitsPerBag=measureByBag?(parseFloat(document.getElementById('df-upb').value)||0):0;
  if(editId){await api('/api/designs/'+editId,{method:'PUT',body:{name,measureByBag,unitsPerBag}});const idx=state.designs.findIndex(d=>d.id===editId);if(idx>=0)state.designs[idx]={...state.designs[idx],name,measureByBag,unitsPerBag};}
  else{const d=await api('/api/designs',{method:'POST',body:{name,measureByBag,unitsPerBag}});state.designs.push(d);}
  closeModal('design');renderAdmin();
}
async function toggleDesign(id){const d=state.designs.find(x=>x.id===id);if(!d)return;await api('/api/designs/'+id,{method:'PUT',body:{active:!d.active}});d.active=!d.active;renderAdmin();}
async function deleteDesign(id){if(!confirm('Delete this design?'))return;await api('/api/designs/'+id,{method:'DELETE'});state.designs=state.designs.filter(d=>d.id!==id);renderAdmin();}

// Colors
async function addColor(){const input=document.getElementById('new-color-input'),name=input.value.trim();if(!name)return;if(state.colors.includes(name)){alert('Already exists');return;}await api('/api/colors',{method:'POST',body:{name}});state.colors.push(name);input.value='';renderAdmin();}
async function removeColor(name){if(!confirm(`Remove "${name}"?`))return;await api('/api/colors/'+encodeURIComponent(name),{method:'DELETE'});state.colors=state.colors.filter(c=>c!==name);state.prices=state.prices.filter(p=>p.color!==name);renderAdmin();}

// Locations
async function addLocation(){const input=document.getElementById('new-location-input'),name=input.value.trim();if(!name)return;if(state.locations.includes(name)){alert('Already exists');return;}await api('/api/locations',{method:'POST',body:{name}});state.locations.push(name);input.value='';renderAdmin();}
async function removeLocation(name){if(!confirm(`Remove "${name}"?`))return;await api('/api/locations/'+encodeURIComponent(name),{method:'DELETE'});state.locations=state.locations.filter(l=>l!==name);state.prices=state.prices.filter(p=>p.location!==name);renderAdmin();}

// Price Editor
function openPriceEditor(designId) {
  const d = state.designs.find(x=>x.id===designId);
  if(!d) return;
  document.getElementById('prices-modal-title').textContent = `Prices — ${d.name}`;

  let html = '<p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">Set price per unit (Rs.) for each color and location.</p>';
  html += '<table class="price-table" style="width:100%"><thead><tr><th>Color</th>';
  state.locations.forEach(l => { html += `<th style="text-align:right">${l}</th>`; });
  html += '</tr></thead><tbody>';

  state.colors.forEach(c => {
    html += `<tr><td>${colorBadge(c)}</td>`;
    state.locations.forEach(l => {
      const price = getPrice(d.id, c, l);
      html += `<td style="text-align:right"><input type="number" class="price-input" min="0" step="0.50" value="${price||''}" placeholder="0.00" data-design="${d.id}" data-color="${c}" data-location="${l}"></td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  html += '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal(\'prices\')">Cancel</button><button class="btn btn-success" onclick="savePrices()">Save All Prices</button></div>';

  document.getElementById('prices-form').innerHTML = html;
  openModal('prices');
}

async function savePrices() {
  const inputs = document.querySelectorAll('.price-input');
  const prices = [];
  inputs.forEach(inp => {
    const price = parseFloat(inp.value) || 0;
    prices.push({ designId: inp.dataset.design, color: inp.dataset.color, location: inp.dataset.location, price });
  });
  await api('/api/prices/bulk', { method: 'POST', body: { prices } });
  // Reload prices
  state.prices = await api('/api/prices');
  closeModal('prices');
  renderAdmin();
}

// ═══ INIT ═══
async function init() {
  buildNav();
  await loadAll();
  if(!priceLocation && state.locations.length) priceLocation = state.locations[0];
  renderDashboard();
}
init();
</script>
